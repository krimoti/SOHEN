<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dazura Expert v15.0 - 2.5 Edition</title>
    <style>
        :root { --primary: #1a2a3a; --accent: #3498db; --success: #27ae60; --bg: #f8fafc; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--primary); }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        header { border-bottom: 2px solid #edf2f7; margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; }
        .tab { padding: 10px 18px; cursor: pointer; border-radius: 8px; background: #edf2f7; border: none; font-weight: bold; white-space: nowrap; }
        .tab.active { background: var(--accent); color: white; }
        .section { display: none; }
        .section.active { display: block; }
        textarea, input, select { width: 100%; padding: 14px; border: 1px solid #cbd5e0; border-radius: 10px; font-size: 16px; box-sizing: border-box; margin-bottom: 12px; background: white; }
        button { padding: 14px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; background: var(--accent); width: 100%; }
        #output { background: #fdfdfd; padding: 20px; border: 1px solid #e2e8f0; border-right: 6px solid var(--accent); border-radius: 10px; white-space: pre-wrap; margin-top: 20px; line-height: 1.7; font-size: 16px; }
        .loader { display: none; border: 3px solid #f3f3f3; border-top: 3px solid var(--accent); border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; margin-right: 10px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-card { color: #c53030; background: #fff5f5; border: 1px solid #feb2b2; padding: 15px; border-radius: 10px; margin-top: 20px; direction: ltr; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2 style="margin:0;">🛠️ Dazura Expert</h2>
        <span style="font-size: 0.75em; background: #e2e8f0; color: #4a5568; padding: 4px 10px; border-radius: 10px; font-weight: bold;">v15.0 Next-Gen</span>
    </header>

    <div class="tabs">
        <button class="tab active" onclick="showSection('user-section', this)">ניתוח BOM</button>
        <button class="tab" onclick="showSection('admin-section', this)">הגדרות</button>
    </div>

    <div id="user-section" class="section active">
        <textarea id="inputParts" style="height: 140px;" placeholder="הכנס מק&quot;טים לניתוח (למשל: DTM04-4P)..."></textarea>
        <button onclick="runAnalysis()">
            <div id="loader" class="loader"></div> נתח פרויקט (דור 2.5)
        </button>
        <div id="output">המתן להזנת נתונים...</div>
    </div>

    <div id="admin-section" class="section">
        <h3>הגדרות סוכן AI</h3>
        
        <label>בחר מודל פעיל:</label>
        <select id="modelSelect">
            <option value="gemini-2.5-flash">Gemini 2.5 Flash (מאוזן)</option>
            <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash-Lite (הכי מהיר)</option>
            <option value="gemini-2.5-pro">Gemini 2.5 Pro (הכי חכם)</option>
        </select>

        <label>Gemini API Key:</label>
        <input type="password" id="apiKeyInput" placeholder="הדבק כאן את המפתח שלך">
        
        <button style="background:var(--success)" onclick="saveAdmin()">💾 שמור הגדרות</button>
    </div>
</div>

<script>
    window.onload = () => {
        document.getElementById('apiKeyInput').value = localStorage.getItem('dazura_api_key') || "";
        document.getElementById('modelSelect').value = localStorage.getItem('dazura_model') || "gemini-2.5-flash";
    };

    function showSection(id, el) {
        const sections = document.getElementsByClassName('section');
        for (let s of sections) s.classList.remove('active');
        const tabs = document.getElementsByClassName('tab');
        for (let t of tabs) t.classList.remove('active');
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function saveAdmin() {
        localStorage.setItem('dazura_api_key', document.getElementById('apiKeyInput').value);
        localStorage.setItem('dazura_model', document.getElementById('modelSelect').value);
        alert("הגדרות דור 2.5 נשמרו בהצלחה!");
    }

    async function runAnalysis() {
        const parts = document.getElementById('inputParts').value;
        const apiKey = localStorage.getItem('dazura_api_key');
        const activeModel = localStorage.getItem('dazura_model') || "gemini-2.5-flash";
        const output = document.getElementById('output');
        const loader = document.getElementById('loader');

        if (!apiKey) return alert("אנא הגדר API Key בלשונית הגדרות!");
        if (!parts) return alert("הזן מק\"ט לניתוח!");

        loader.style.display = "inline-block";
        output.innerText = `מתחבר למודל ${activeModel}...`;

        // שימוש בכתובת המותאמת לדור 2.5
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${activeModel}:generateContent?key=${apiKey}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `אתה מומחה הנדסת חיווט בכיר. נתח את המק"טים הבאים וספק פירוט הנדסי מלא (יצרן, AWG, כלי לחיצה, הוראות עבודה): ${parts}` }] }]
                })
            });

            const data = await response.json();

            if (data.candidates && data.candidates[0].content) {
                output.innerText = data.candidates[0].content.parts[0].text;
            } else if (data.error) {
                output.innerHTML = `<div class='error-card'>שגיאת גוגל (דור 2.5): ${data.error.message}<br>קוד: ${data.error.code}</div>`;
            } else {
                output.innerHTML = "<div class='error-card'>התקבלה תשובה ריקה. בדוק את הגדרות המפתח.</div>";
            }
        } catch (e) {
            output.innerHTML = `<div class='error-card'>Network Error: ${e.message}</div>`;
        } finally {
            loader.style.display = "none";
        }
    }
</script>
</body>
</html>
