        :root {
            --ink: #0d1117;

            --card: #ffffff;
            --accent: #1a6ef5;
            --accent-light: #e8f0fe;

            --danger: #d7263d;
            --danger-bg: #fff0f2;

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: var(--sans);
        background: var(--surface);
        color: var(--ink);
        min-height: 100vh;
        padding: 16px;
    }

    .shell {
        max-width: 720px;
        margin: auto;
        background: var(--card);
        border-radius: 18px;
        box-shadow: 0 2px 24px rgba(0,0,0,0.08);
        overflow: hidden;
    }

    /* ── Header ── */
    .header {
        background: var(--ink);
        color: white;
        padding: 18px 22px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .header-title {
        font-size: 1.15rem;
        font-weight: 700;
        letter-spacing: 0.02em;
    }
    .badge {
        font-family: var(--mono);
        font-size: 0.7rem;
        background: rgba(255,255,255,0.12);
        border: 1px solid rgba(255,255,255,0.2);
        padding: 3px 10px;
        border-radius: 20px;
        color: #a0b4cc;
    }

    /* ── Tabs ── */
    .tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        background: #fafbfc;
    }
    .tab {
        flex: 1;
        padding: 13px 10px;
        border: none;
        background: transparent;
        font-family: var(--sans);
        font-size: 0.88rem;
        font-weight: 600;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.18s;
        border-bottom: 3px solid transparent;
    }
    .tab:hover { color: var(--accent); }
    .tab.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
        background: white;
    }

    /* ── Sections ── */
    .section { display: none; padding: 22px; }
    .section.active { display: block; }

    /* ── Form elements ── */
    label {
        display: block;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    textarea, input[type="password"], input[type="text"] {
        width: 100%;
        padding: 13px 15px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-family: var(--mono);
        font-size: 0.92rem;
        color: var(--ink);
        background: var(--surface);
        transition: border-color 0.18s, box-shadow 0.18s;
        resize: vertical;
        margin-bottom: 14px;
        direction: ltr;
        text-align: left;
    }
    textarea:focus, input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(26,110,245,0.1);
        background: white;
    }
    textarea { height: 130px; }

    /* ── Buttons ── */
    .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 13px 22px;
        border: none;
        border-radius: 10px;
        font-family: var(--sans);
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.18s;
        width: 100%;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #1559cc; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #0b8a51; }
    .btn-primary:disabled { background: #93b4e8; cursor: not-allowed; transform: none; }

    /* ── Output ── */
    .output-box {
        margin-top: 18px;
        border: 1.5px solid var(--border);
        border-right: 5px solid var(--accent);
        border-radius: 10px;
        background: var(--surface);
        overflow: hidden;
    }
    .output-header {
        background: var(--accent-light);
        padding: 8px 14px;
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border-bottom: 1px solid #c5d8fc;
    }
    .output-body {
        padding: 16px;
        font-family: var(--mono);
        font-size: 0.85rem;
        line-height: 1.75;
        white-space: pre-wrap;
        color: var(--ink);
        min-height: 80px;
        direction: ltr;
        text-align: left;
    }
    .output-placeholder {
        font-family: var(--sans);
        color: var(--muted);
        font-style: italic;
        direction: rtl;
        text-align: right;
    }

    /* ── Error ── */
    .error-box {
        margin-top: 18px;
        background: var(--danger-bg);
        border: 1.5px solid #f5b8c0;
        border-right: 5px solid var(--danger);
        border-radius: 10px;
        padding: 14px 16px;
        font-family: var(--mono);
        font-size: 0.82rem;
        color: var(--danger);
        direction: ltr;
        text-align: left;
        line-height: 1.6;
    }
    .error-title {
        font-weight: 700;
        margin-bottom: 6px;
        font-size: 0.85rem;
    }

    /* ── Loader ── */
    .spinner {
        width: 16px;
        height: 16px;
        border: 2.5px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Inventory ── */
    .inv-row {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 8px;
        margin-bottom: 8px;
        align-items: center;
    }
    .inv-row input { margin-bottom: 0; }
    .btn-remove {
        width: 36px;
        height: 36px;
        padding: 0;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        background: white;
        color: var(--danger);
        font-size: 1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }
    .btn-add {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 9px 16px;
        border: 1.5px dashed var(--border);
        border-radius: 9px;
        background: transparent;
        color: var(--muted);
        font-family: var(--sans);
        font-size: 0.85rem;
        cursor: pointer;
        margin-bottom: 14px;
        transition: all 0.15s;
    }
    .btn-add:hover { border-color: var(--accent); color: var(--accent); }

    .inv-header {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 8px;
        margin-bottom: 6px;
    }
    .inv-header span {
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    /* ── Settings ── */
    .settings-group { margin-bottom: 20px; }
    .settings-group h4 {
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 10px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--border);
    }
    .key-status {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.8rem;
        margin-top: -8px;
        margin-bottom: 12px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.ok { background: var(--success); }
    .dot.missing { background: var(--danger); }

    select {
        width: 100%;
        padding: 11px 14px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-family: var(--sans);
        font-size: 0.9rem;
        color: var(--ink);
        background: var(--surface);
        margin-bottom: 14px;
    }
    select:focus { outline: none; border-color: var(--accent); }

    .alert-success {
        background: #f0fff8;
        border: 1px solid #a3e4c4;
        color: var(--success);
        padding: 10px 14px;
        border-radius: 9px;
        font-size: 0.85rem;
        margin-top: 10px;
        display: none;
    }
</style>

    <span class="header-title">🛠️ Dazura Expert</span>

</div>

<div class="tabs">

</div>

<!-- ── ANALYZE TAB ── -->
<div id="analyze" class="section active">
    <label>הזן מק"טים לניתוח</label>
    <textarea id="inputParts" placeholder="למשל: DTM04-4P, DTM04-6P, W2S-T1BF..."></textarea>
    <button class="btn btn-primary" id="analyzeBtn" onclick="runAnalysis()">

</div>

<script>
    // ── State ──
    function switchTab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    // ── Settings ──
    window.onload = () => {
        const key = localStorage.getItem('dazura_gemini_key') || '';
        const model = localStorage.getItem('dazura_model') || 'gemini-1.5-flash-latest';
        document.getElementById('apiKeyInput').value = key;
        document.getElementById('modelSelect').value = model;
        updateKeyStatus(key);
        loadInventory();
    };

    function updateKeyStatus(key) {
        const dot = document.getElementById('keyDot');
        const label = document.getElementById('keyLabel');
        if (key && key.length > 10) {
            dot.className = 'dot ok';
            label.textContent = 'מוגדר ✓';
        } else {
            dot.className = 'dot missing';
            label.textContent = 'לא הוגדר';
        }
    }

    function saveSettings() {
        const key = document.getElementById('apiKeyInput').value.trim();
        const model = document.getElementById('modelSelect').value;
        localStorage.setItem('dazura_gemini_key', key);
        localStorage.setItem('dazura_model', model);
        updateKeyStatus(key);
        const alert = document.getElementById('saved-alert');
        alert.style.display = 'block';
        setTimeout(() => alert.style.display = 'none', 2500);
    }

    // ── Analysis ──
    async function runAnalysis() {
        const parts = document.getElementById('inputParts').value.trim();
        const apiKey = localStorage.getItem('dazura_gemini_key');
        const model = localStorage.getItem('dazura_model') || 'gemini-1.5-flash-latest';
        const resultArea = document.getElementById('result-area');
        const loader = document.getElementById('loader');
        const btn = document.getElementById('analyzeBtn');
        const btnLabel = document.getElementById('btnLabel');

        if (!apiKey) {
            resultArea.innerHTML = `<div class="error-box"><div class="error-title">⚠ API Key חסר</div>עבור לטאב הגדרות והזן את ה-Gemini API Key שלך.</div>`;
            return;
        }
        if (!parts) {
            resultArea.innerHTML = `<div class="error-box"><div class="error-title">⚠ קלט ריק</div>הזן מק"טים לניתוח.</div>`;
            return;
        }

        loader.style.display = 'block';
        btn.disabled = true;
        btnLabel.textContent = 'מנתח...';
        resultArea.innerHTML = '';

        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
        const prompt = `אתה מומחה הנדסת חיווט ו-BOM.
נתח את המק"טים הבאים:
${parts}

לכל מק"ט ציין:
- שם הרכיב ויצרן
- סוג ותיאור קצר
- שימוש נפוץ
- הערות (חלופות, סדרה, תאימות)

פורמט: טקסט ברור, ללא Markdown, בעברית.`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { temperature: 0.2, maxOutputTokens: 1500 }
                })
            });

            const data = await response.json();

            if (data.error) {
                const code = data.error.code || '';
                const msg = data.error.message || '';
                let hint = '';
                if (code === 404) hint = '💡 המודל לא נמצא — שנה מודל בהגדרות.';
                else if (code === 401 || code === 403) hint = '💡 ה-API Key שגוי או חסרות הרשאות.';
                else if (code === 429) hint = '💡 חרגת ממכסת ה-API. נסה שוב בעוד רגע.';
                resultArea.innerHTML = `<div class="error-box"><div class="error-title">Google API Error ${code}</div>${msg}${hint ? '<br><br>' + hint : ''}</div>`;
                return;
            }

            const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (text) {
                resultArea.innerHTML = `
                    <div class="output-box">
                        <div class="output-header">תוצאת ניתוח</div>
                        <div class="output-body">${escapeHtml(text)}</div>
                    </div>`;
            } else {
                resultArea.innerHTML = `<div class="error-box"><div class="error-title">תשובה ריקה</div>ה-API לא החזיר תוצאה. בדוק את הקלט ונסה שוב.</div>`;
            }

        } catch (e) {
            resultArea.innerHTML = `<div class="error-box"><div class="error-title">Network Error</div>${e.message}</div>`;
        } finally {
            loader.style.display = 'none';
            btn.disabled = false;
            btnLabel.textContent = 'נתח BOM';
        }
    }

    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Inventory ──
    function addInvRow(partNum = '', qty = '') {
        const container = document.getElementById('inv-rows');
        const row = document.createElement('div');
        row.className = 'inv-row';
        row.innerHTML = `
            <input type="text" placeholder="מק&quot;ט" value="${partNum}" style="direction:ltr;text-align:left;">
            <input type="text" placeholder="כמות" value="${qty}" style="direction:ltr;text-align:left;">
            <button class="btn-remove" onclick="this.parentElement.remove()">✕</button>
        `;
        container.appendChild(row);
    }

    function saveInventory() {
        const rows = document.querySelectorAll('.inv-row');
        const data = [];
        rows.forEach(row => {
            const inputs = row.querySelectorAll('input');
            const part = inputs[0].value.trim();
            const qty = inputs[1].value.trim();
            if (part) data.push({ part, qty });
        });
        localStorage.setItem('dazura_inventory', JSON.stringify(data));
        const alert = document.getElementById('inv-saved');
        alert.style.display = 'block';
        setTimeout(() => alert.style.display = 'none', 2500);
    }

    function loadInventory() {
        const saved = JSON.parse(localStorage.getItem('dazura_inventory') || '[]');
        if (saved.length === 0) {
            addInvRow();
        } else {
            saved.forEach(item => addInvRow(item.part, item.qty));
        }
    }
</script>
