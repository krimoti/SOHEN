<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dazura Expert v14.1 - Stable</title>
    <style>
        :root { --primary: #1a2a3a; --accent: #3498db; --success: #27ae60; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--primary); }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        header { border-bottom: 2px solid #edf2f7; margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; border-radius: 8px; background: #edf2f7; border: none; font-weight: bold; }
        .tab.active { background: var(--accent); color: white; }
        .section { display: none; }
        .section.active { display: block; }
        textarea, input { width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; }
        button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; background: var(--accent); }
        #output { background: #fff; padding: 20px; border: 1px solid #e2e8f0; border-right: 5px solid var(--accent); border-radius: 8px; white-space: pre-wrap; margin-top: 20px; line-height: 1.6; }
        .loader { display: none; border: 3px solid #f3f3f3; border-top: 3px solid var(--accent); border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; margin-left: 8px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media print { .tabs, .admin-only, button, textarea, input, p { display: none !important; } .container { box-shadow: none; border: none; } #output { display: block !important; border: none; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🛠️ Dazura Expert Agent</h1>
        <span style="font-size: 0.8em; color: #718096;">גרסה יציבה 14.1</span>
    </header>

    <div class="tabs">
        <button class="tab active" onclick="showSection('user-section', this)">ניתוח</button>
        <button class="tab" onclick="showSection('inventory-section', this)">מלאי</button>
        <button class="tab" onclick="showSection('admin-section', this)">הגדרות (Admin)</button>
    </div>

    <div id="user-section" class="section active">
        <textarea id="inputParts" style="height: 100px;" placeholder="הכנס מק&quot;טים (אחד בכל שורה)..."></textarea>
        <div class="btn-group">
            <button onclick="runAnalysis()">נתח פרויקט <div id="loader" class="loader" style="display:none;"></div></button>
            <button style="background:#718096" onclick="window.print()">הדפס PDF</button>
        </div>
        <div id="output">התוצאות יופיעו כאן...</div>
    </div>

    <div id="inventory-section" class="section">
        <h3>📦 מלאי מחסן</h3>
        <textarea id="inventoryData" style="height: 250px;" placeholder="מק&quot;ט, כמות, מיקום..."></textarea>
        <button style="background:var(--success)" onclick="saveData('dazura_inventory', 'inventoryData')">שמור מלאי</button>
    </div>

    <div id="admin-section" class="section">
        <h3>🧠 הגדרות מוח (System Prompt)</h3>
        <textarea id="systemPromptInput" style="height: 300px;"></textarea>
        <input type="password" id="apiKeyInput" placeholder="הדבק API Key כאן">
        <button style="background:var(--success)" onclick="saveAdmin()">שמור הגדרות</button>
    </div>
</div>

<script>
    const MASTER_PROMPT = `אתה מומחה בכיר להנדסת חיווט. נתח את המק"טים שיתקבלו:
1. זיהוי והתאמה: יצרן, AWG, וקוטר בידוד מקסימלי. האם חוט PVC/סיליקון/טפלון יתאימו?
2. מלאי: בדוק אם המק"ט ברשימה שסופקה. ציין מיקום או חלופה מהמלאי.
3. דוח לקוח: טבלה טכנית [attachment_0](attachment), יתרונות ועלות חומר גלם סה"כ.
4. ייצור: שלבי חשיפה, כלי לחיצה והגדרות, וסדר הכנסה.
5. תקלות: רשימת בדיקה (QA).
6. רכש: קישורים ל-Mouser/DigiKey/Farnell.
7. תמחור: הערך עלות ליחידה בכמויות 1, 100, 1000.`;

    window.onload = () => {
        document.getElementById('systemPromptInput').value = localStorage.getItem('dazura_prompt') || MASTER_PROMPT;
        document.getElementById('apiKeyInput').value = localStorage.getItem('dazura_api_key') || "";
        document.getElementById('inventoryData').value = localStorage.getItem('dazura_inventory') || "";
    };

    function showSection(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function saveData(key, id) {
        localStorage.setItem(key, document.getElementById(id).value);
        alert("נשמר בהצלחה!");
    }

    function saveAdmin() {
        localStorage.setItem('dazura_prompt', document.getElementById('systemPromptInput').value);
        localStorage.setItem('dazura_api_key', document.getElementById('apiKeyInput').value);
        alert("הגדרות Admin נשמרו!");
    }

    async function runAnalysis() {
        const parts = document.getElementById('inputParts').value;
        const prompt = localStorage.getItem('dazura_prompt');
        const inventory = localStorage.getItem('dazura_inventory');
        const apiKey = localStorage.getItem('dazura_api_key');
        
        if (!apiKey) return alert("חסר API Key!");
        if (!parts) return alert("הזן מק\"טים!");

        const loader = document.getElementById('loader');
        const output = document.getElementById('output');
        loader.style.display = "inline-block";
        output.innerText = "מנתח נתונים...";

        try {
            // שימוש במודל 1.5 Flash - מהיר ויציב יותר
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `${prompt}\n\nמלאי פנימי:\n${inventory}\n\nמק"טים לניתוח:\n${parts}` }] }]
                })
            });

            const data = await response.json();
            
            // טיפול במבנה התשובה של Gemini 1.5
            if (data.candidates && data.candidates[0].content) {
                let resText = data.candidates[0].content.parts[0].text;
                output.innerText = resText;
            } else {
                output.innerText = "שגיאה בתשובת השרת. וודא שהמפתח תקין ושיש לך הרשאות.";
            }
        } catch (e) {
            output.innerText = "שגיאת תקשורת: " + e.message;
        } finally {
            loader.style.display = "none";
        }
    }
</script>
</body>
</html>
